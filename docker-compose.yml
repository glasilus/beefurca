version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: beefurca-postgres
    environment:
      POSTGRES_USER: beefurca
      POSTGRES_PASSWORD: beefurca_secure_password
      POSTGRES_DB: beefurca_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7.4-alpine
    container_name: beefurca-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
